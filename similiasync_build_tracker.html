.status-icon { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.s-done { background: var(--bg-success); }
.s-done i { color: var(--text-success); font-size: 11px; }
.s-part { background: var(--bg-warning); }
.s-part i { color: var(--text-warning); font-size: 11px; }
.s-todo { background: var(--surface-0); border: 0.5px solid var(--border); }
.s-todo i { color: var(--text-muted); font-size: 11px; }
.item-text { flex: 1; font-size: 13px; color: var(--text-primary); line-height: 1.5; }
.item-note { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 1px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
.b-done { background: var(--bg-success); color: var(--text-success); }

.b-todo { background: var(--surface-0); border: 0.5px solid var(--border); color: var(--text-muted); }
.chevron { font-size: 14px; color: var(--text-muted); transition: transform 0.2s; }
.chevron.open { transform: rotate(180deg); }
.legend { display: flex; gap: 16px; margin-bottom: 1rem; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-secondary); }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }
</style>

function countItems(phase) {
  let done = 0, part = 0, total = 0;
  phase.sections.forEach(s => s.items.forEach(i => {
    total++;
    if (i.s === 'done') done++;
    else if (i.s === 'part') part++;
  }));
  return { done, part, total };
}

function pct(done, part, total) {
  return Math.round(((done + part * 0.5) / total) * 100);
}

function fillColor(p) {
  if (p >= 80) return 'fill-done';
  if (p >= 30) return 'fill-part';
  return 'fill-todo';
}

const container = document.getElementById('phases');

phases.forEach((phase, idx) => {
  const { done, part, total } = countItems(phase);
  const p = pct(done, part, total);
  const fc = fillColor(p);

  const el = document.createElement('div');
  el.className = 'phase';

  const itemsHtml = phase.sections.map(s => `
    <div class="section-label">${s.label}</div>
    ${s.items.map(i => `
      <div class="item">
        <div class="status-icon s-${i.s}">
          <i class="ti ti-${i.s === 'done' ? 'check' : i.s === 'part' ? 'minus' : 'circle'}" aria-hidden="true"></i>
        </div>
        <div class="item-text">
          ${i.t}
          ${i.note ? `<div class="item-note">${i.note}</div>` : ''}
        </div>
        <span class="badge b-${i.s}">${i.s === 'done' ? 'done' : i.s === 'part' ? 'partial' : 'todo'}</span>
      </div>
    `).join('')}
  `).join('');

  el.innerHTML = `
    <div class="phase-header" onclick="toggle(${idx})">
      <span class="phase-num">${phase.num}</span>
      <span class="phase-title">${phase.title}</span>
      <span class="phase-meta">${done}/${total} done · ${p}%</span>
      <i class="ti ti-chevron-down chevron" id="chev-${idx}" aria-hidden="true"></i>
    </div>
    <div class="progress-bar"><div class="progress-fill ${fc}" style="width:${p}%"></div></div>
    <div class="items" id="items-${idx}">${itemsHtml}</div>
  `;

  container.appendChild(el);
});

function toggle(idx) {
  const items = document.getElementById('items-' + idx);
  const chev = document.getElementById('chev-' + idx);
  const open = items.classList.toggle('open');
  chev.classList.toggle('open', open);
}

toggle(0);
</script>
